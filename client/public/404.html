    <!-- SPA redirect: store the path and load the app -->
    <script>
        // GitHub Pages SPA trick: this 404.html runs for any route that doesn't
        // have a physical file. We store the path in sessionStorage and redirect
        // to the root, where index.html picks it up and routes client-side.
        sessionStorage.setItem('spa-redirect', window.location.pathname + window.location.search);
        window.location.replace('/handy-dev-tools/');
    </script>
